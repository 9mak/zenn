name: Post New Article to X

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**.md'

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get added article files
        id: changed
        run: |
          ADDED=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'articles/*.md')
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "Added files: $ADDED"

      - name: Post to X
        if: steps.changed.outputs.added != ''
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          for file in ${{ steps.changed.outputs.added }}; do
            echo "Processing: $file"
            node .github/scripts/post-to-x.mjs "$file"
          done
